    # ── HTTPS — kg.lute-tlz-dddd.top (PromptForge 灵词) ──────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name kg.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://promptforge_app:3000;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }
    }
