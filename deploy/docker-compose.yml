name: promptforge

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: promptforge_app
    container_name: promptforge_app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.prod
    networks:
      - lighthouse_ai_video_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging: *default-logging

networks:
  lighthouse_ai_video_net:
    external: true
